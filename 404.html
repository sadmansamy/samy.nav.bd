<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        /* UI styles are hidden by default so instant links don't flash */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: none; 
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
        }
        .container { text-align: center; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #007bff;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner"></div>
        <h2 id="status">Preparing secure redirect...</h2>
        <p id="error-message" style="color: #dc3545; display: none; font-weight: bold;"></p>
    </div>

    <script>
        async function handleHybridRedirect() {
            const UI_DELAY_SECONDS = 3; // Delay time only for UI links

            const path = window.location.pathname.replace(/^\/|\/$/g, '');
            const shortCode = path.toLowerCase();

            if (!shortCode) {
                showError("Welcome! Please provide a short code.");
                return;
            }

            try {
                const response = await fetch('/urls.json');
                if (!response.ok) throw new Error('Database error');
                const urlDatabase = await response.json();

                // Check 1: Is it a regular, instant link?
                if (urlDatabase[shortCode]) {
                    window.location.replace(urlDatabase[shortCode]);
                    return;
                }

                // Check 2: Is it a UI-delayed link?
                const uiCode = 'ui-' + shortCode;
                if (urlDatabase[uiCode]) {
                    // Turn on the user interface instantly
                    document.body.style.display = 'flex';
                    document.getElementById('status').innerText = `Redirecting you safely in ${UI_DELAY_SECONDS} seconds...`;

                    // Wait and then redirect
                    setTimeout(() => {
                        window.location.replace(urlDatabase[uiCode]);
                    }, UI_DELAY_SECONDS * 1000);
                    return;
                }

                // If code doesn't exist anywhere
                showError("404 - Link Not Found");

            } catch (error) {
                showError("System Error: Could not load data.");
            }
        }

        function showError(message) {
            document.body.style.display = 'flex';
            document.querySelector('.spinner').style.display = 'none';
            document.getElementById('status').innerText = message;
        }

        handleHybridRedirect();
    </script>
</body>
</html>
