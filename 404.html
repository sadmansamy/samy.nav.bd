<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Qsamy</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        /* GitHub logo styling */
        .github-logo { fill: #ffffff; margin-bottom: 20px; }
        .code-404 { font-size: 80px; font-weight: 800; color: #ffffff; margin-bottom: 10px; }
        
        h2 { font-size: 24px; color: #ffffff; margin-bottom: 30px; }

        .search-box { margin-bottom: 30px; display: flex; gap: 8px; }
        input { padding: 8px 12px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; width: 200px; }
        button { padding: 8px 16px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: white; cursor: pointer; }

        .footer-links { color: #8b949e; font-size: 14px; }
        .footer-links a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>

    <!-- GitHub Logo SVG -->
    <svg class="github-logo" height="64" viewBox="0 0 16 16" width="64"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
    
    <div class="code-404">404</div>
    <h2 id="status">Didn't find anything here!</h2>

    <div class="search-box">
        <input type="text" placeholder="Search..." id="urlInput">
        <button onclick="window.location.href='https://samy.pro.bd'">Go Home</button>
    </div>

    <div class="footer-links">
        Contact Support — <a href="#">Qsamy Status</a>
    </div>

    <script>
        async function handleHybridRedirect() {
            const path = window.location.pathname.replace(/^\/|\/$/g, '').toLowerCase();
            if (!path) return;

            try {
                const response = await fetch('/urls.json');
                const urlDatabase = await response.json();

                if (urlDatabase[path]) {
                    window.location.replace(urlDatabase[path]);
                } else if (urlDatabase['ui-' + path]) {
                    setTimeout(() => window.location.replace(urlDatabase['ui-' + path]), 300);
                }
            } catch (e) {
                console.error("Database unavailable");
            }
        }
        handleHybridRedirect();
    </script>
</body>
</html>
