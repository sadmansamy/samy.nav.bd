<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store Gallery</title>
    <style>
        body { margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; }
        
        .section-title { font-size: 1.2rem; font-weight: 700; margin: 30px 0 15px; color: #000; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px 15px; }
        
        .app-item { text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .app-item img { width: 100%; max-width: 120px; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 26px; box-shadow: 0 6px 12px rgba(0,0,0,0.15); display: block; }
        .app-title { font-size: 13px; margin-top: 10px; line-height: 1.3; color: #202124; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        /* Modal Styles */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; width: 85%; max-width: 400px; padding: 25px; border-radius: 28px; text-align: center; }
        .source-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; background: #f1f3f4; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div id="container"></div>

    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="mImg" style="width:100px; border-radius:20px;">
            <h2 id="mName"></h2>
            <p id="mDis" style="color: #5f6368;"></p>
            <div id="mLinks"></div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        let currentGallery;

        fetch('app.json?t=' + Date.now())
            .then(r => r.json())
            .then(data => {
                data.forEach(item => {
                    if (!item.img) {
                        let h2 = document.createElement('h2');
                        h2.className = "section-title";
                        h2.innerText = item.name;
                        container.appendChild(h2);
                        currentGallery = document.createElement('div');
                        currentGallery.className = "gallery";
                        container.appendChild(currentGallery);
                    } else {
                        let div = document.createElement('div');
                        div.className = "app-item";
                        div.innerHTML = `<img src="${item.img}"> <div class="app-title">${item.name}</div>`;
                        
                        div.querySelector('img').onclick = () => window.location.href = item.urls[0];
                        
                        div.querySelector('.app-title').onclick = () => {
                            document.getElementById('mName').innerText = item.name;
                            document.getElementById('mDis').innerText = item.dis;
                            document.getElementById('mImg').src = item.img;
                            let mLinks = document.getElementById('mLinks');
                            mLinks.innerHTML = "";
                            // Changed button text to "URL"
                            item.urls.forEach((u) => {
                                mLinks.innerHTML += `<button class="source-btn" onclick="window.location.href='${u}'">URL</button>`;
                            });
                            document.getElementById('modal').style.display = 'flex';
                        };
                        currentGallery.appendChild(div);
                    }
                });
            });
    </script>
</body>
</html>
