<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .section-title { font-size: 1.2rem; font-weight: bold; margin: 20px 0 10px; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .app-item img { width: 100%; border-radius: 20px; cursor: pointer; }
        
        /* Popup Modal */
        #modal { display:none; position:fixed; top:20%; left:10%; width:80%; background:#fff; padding:20px; border-radius:20px; box-shadow: 0 0 20px rgba(0,0,0,0.3); z-index:100; }
    </style>
</head>
<body>

<div id="container"></div>

<div id="modal">
    <img id="mImg" style="width:80px; border-radius:15px;">
    <h2 id="mName"></h2>
    <p id="mDis"></p>
    <div id="mLinks"></div>
    <button onclick="document.getElementById('modal').style.display='none'">Close</button>
</div>

<script>
    fetch('app.json?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
            let container = document.getElementById('container');
            let currentGallery;

            data.forEach(item => {
                if(item.type === "section") {
                    let h2 = document.createElement('h2');
                    h2.className = "section-title";
                    h2.innerText = item.name;
                    container.appendChild(h2);
                    currentGallery = document.createElement('div');
                    currentGallery.className = "gallery";
                    container.appendChild(currentGallery);
                } else {
                    let div = document.createElement('div');
                    div.className = "app-item";
                    div.innerHTML = `<img src="${item.img}"> <div class="app-title">${item.name}</div>`;
                    
                    // Click Image: First URL
                    div.querySelector('img').onclick = () => window.location.href = item.urls[0];
                    
                    // Click Title: Show Popup
                    div.querySelector('.app-title').onclick = () => {
                        document.getElementById('mName').innerText = item.name;
                        document.getElementById('mDis').innerText = item.dis;
                        document.getElementById('mImg').src = item.img;
                        let mLinks = document.getElementById('mLinks');
                        mLinks.innerHTML = "";
                        item.urls.forEach((u, i) => {
                            mLinks.innerHTML += `<button onclick="window.location.href='${u}'">Source ${i+1}</button><br>`;
                        });
                        document.getElementById('modal').style.display = 'block';
                    };
                    currentGallery.appendChild(div);
                }
            });
        });
</script>
</body>
</html>
