<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="A personal, minimalist search hub and bookmark portal.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qsamy Search</title>
    <link href="icon.png" rel="icon" type="image/png" />
    <meta name="theme-color" content="#f5f5f7" id="theme-color-meta">
    
    <style>
        :root {
            --bg-color: #f5f5f7;
            --surface-color: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent-color: #0071e3;
            --border-color: #e8e8ed;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --danger-color: #ff3b30;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --surface-color: #1c1c1e;
            --text-main: #f5f5f7;
            --text-muted: #8e8e93;
            --accent-color: #0a84ff;
            --border-color: #2c2c2e;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            padding: 24px 16px; transition: background-color 0.3s ease;
        }

        .workspace { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 24px; align-items: center; }

        .search-wrapper { width: 100%; position: relative; }
        .search-bar-container { display: flex; align-items: center; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 24px; padding: 4px 8px; box-shadow: var(--shadow); }
        
        input { flex: 1; border: none; background: transparent; font-size: 17px; color: var(--text-main); outline: none; padding: 14px 0; }

        .go-btn { background: var(--accent-color); color: white; border: none; border-radius: 18px; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        
        .section-container { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .shortcuts-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        
        .shortcut-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text-main); padding: 8px 4px; border-radius: 16px; transition: var(--transition); }
        .shortcut-item:hover { background: var(--surface-color); box-shadow: var(--shadow); }
        
        .icon-container { width: 52px; height: 52px; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 14px; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; box-shadow: var(--shadow); }
        .icon-container img { width: 26px; height: 26px; object-fit: contain; }
        .shortcut-title { font-size: 11px; font-weight: 500; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

<div class="workspace">
    <div class="search-wrapper">
        <div class="search-bar-container">
            <input type="text" id="urlInput" placeholder="Search...">
            <button class="go-btn" onclick="navigateToSite()">Go</button>
        </div>
    </div>

    <div class="section-container">
        <div class="shortcuts-grid" id="jsonShortcutsGrid"></div>
    </div>
</div>

<script>
    let jsonShortcuts = [];

    async function loadShortcuts() {
        try {
            // Added ?t=Date.now() to force the browser to bypass cache
            const response = await fetch('/weblist.json?t=' + Date.now());
            jsonShortcuts = await response.json();
            
            const grid = document.getElementById('jsonShortcutsGrid');
            grid.innerHTML = '';
            
            jsonShortcuts.forEach(item => {
                const a = document.createElement('a');
                a.className = 'shortcut-item';
                a.href = item.url;
                a.innerHTML = `
                    <div class="icon-container">
                        <img src="${item.img}" onerror="this.style.display='none'">
                    </div>
                    <div class="shortcut-title">${item.name}</div>
                `;
                grid.appendChild(a);
            });
        } catch(e) {
            console.error("Failed to load shortcuts:", e);
        }
    }

    function navigateToSite() {
        const i = document.getElementById('urlInput').value.trim();
        if (i) window.location.href = i.startsWith('http') ? i : 'https://' + i;
    }

    document.addEventListener("DOMContentLoaded", loadShortcuts);
</script>
</body>
</html>
