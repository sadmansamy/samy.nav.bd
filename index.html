<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samy Search</title>
    <link href="/favicon.ico" rel="icon" type="image/x-icon" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f5f5f7" id="theme-color-meta">
    
    <style>
        :root {
            --bg-color: #f5f5f7;
            --surface-color: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent-color: #0071e3;
            --border-color: #e8e8ed;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --danger-color: #ff3b30;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --surface-color: #1c1c1e;
            --text-main: #f5f5f7;
            --text-muted: #8e8e93;
            --accent-color: #0a84ff;
            --border-color: #2c2c2e;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-main);
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            justify-content: flex-start;
            align-items: center; 
            padding: 24px 16px;
            transition: background-color 0.3s ease;
            position: relative;
        }

        .workspace {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
            position: relative;
            padding-top: 12px;
        }

        .top-settings-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
            width: 44px;
            height: 44px;
            transition: var(--transition);
            z-index: 200;
        }
        
        .top-settings-btn:hover { color: var(--accent-color); }

        .top-settings-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .search-wrapper { width: 100%; position: relative; }

        .search-bar-container {
            display: flex;
            align-items: center;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 4px 8px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            z-index: 100;
        }

        .search-bar-container:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.12);
        }

        .search-icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
            margin-left: 4px; 
            margin-right: 4px; 
            width: 36px;
            height: 36px;
        }
        
        .search-icon-btn:hover { background: var(--bg-color); color: var(--accent-color); }

        .search-icon-btn img { width: 20px; height: 20px; object-fit: contain; }

        .search-icon-btn svg { width: 20px; height: 20px; fill: currentColor; }

        input { 
            flex: 1;
            border: none;
            background: transparent;
            font-size: 17px; 
            color: var(--text-main);
            outline: none;
            padding: 14px 0;
            width: 100%;
        }

        .go-btn { 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            border-radius: 18px; 
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer; 
            transition: var(--transition);
        }

        .go-btn svg { width: 18px; height: 18px; fill: currentColor; }

        .history-popup {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            margin-top: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            z-index: 99;
            overflow: hidden;
            display: none;
            padding: 8px 0;
        }

        .history-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .history-item:hover { background: var(--bg-color); }

        .history-content {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            font-size: 15px;
            flex: 1;
            min-width: 0;
        }

        .history-content span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-clock-icon {
            color: var(--text-muted);
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .history-clock-icon svg { width: 16px; height: 16px; fill: currentColor; }

        .section-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-left: 8px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: -0.1px;
        }

        .edit-toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 6px;
            transition: var(--transition);
        }

        .edit-toggle-btn:hover {
            color: var(--accent-color);
            background: rgba(0, 113, 227, 0.05);
        }

        .edit-toggle-btn.active { color: var(--accent-color); }

        .edit-toggle-btn svg { width: 14px; height: 14px; fill: currentColor; }

        .shortcuts-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        @media (max-width: 600px) {
            .shortcuts-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
        }

        .shortcut-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-main) !important;
            outline: none;
            transition: var(--transition);
            border-radius: 16px;
            padding: 8px 4px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .shortcut-item:hover {
            background: var(--surface-color);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }

        .icon-container {
            width: 52px;
            height: 52px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .icon-container img {
            width: 26px;
            height: 26px;
            object-fit: contain;
            border-radius: 4px;
        }

        .icon-fallback {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent-color);
            background: rgba(0, 113, 227, 0.05);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
        }

        .icon-plus {
            font-size: 24px;
            font-weight: 400;
            color: var(--text-muted);
            background: var(--border-color);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
        }

        .shortcut-item:hover .icon-plus { background: rgba(0, 113, 227, 0.08); color: var(--accent-color); }

        .shortcut-title {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-main);
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            background: var(--danger-color);
            color: white;
            border-radius: 50%;
            border: none;
            font-size: 10px;
            font-weight: bold;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .edit-mode .delete-btn { display: flex; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .modal-card h3 { font-size: 18px; color: var(--text-main); margin-bottom: 4px; }
        
        .modal-card input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            background: var(--bg-color);
            color: var(--text-main);
        }

        .custom-select-list {
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
        }

        .custom-select-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid var(--border-color);
        }

        .custom-select-item:last-child { border-bottom: none; }
        .custom-select-item:hover { background: var(--surface-color); }

        .custom-select-left { display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 500; }

        .custom-select-logo { width: 22px; height: 22px; object-fit: contain; }

        .custom-select-radio {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .custom-select-item.selected .custom-select-radio::after {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--accent-color);
            border-radius: 50%;
            display: block;
        }

        .file-upload-label {
            display: block;
            text-align: center;
            padding: 10px;
            background: var(--bg-color);
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        #fileInput { display: none; }
        .or-divider { text-align: center; font-size: 12px; color: var(--text-muted); margin: 2px 0; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 6px; }
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .btn-add { background: var(--accent-color); color: white; }
        .btn-cancel { background: var(--border-color); color: var(--text-main); }

        .setting-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .setting-label { font-size: 14px; font-weight: 600; color: var(--text-muted); }
        
        .history-list-box {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            max-height: 150px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .history-list-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; font-size: 14px; }
        .history-list-item button { background: transparent; border: none; color: var(--danger-color); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="workspace">
    <div class="search-wrapper">
        <div class="search-bar-container">
            <button class="search-icon-btn" id="dynamicEngineBtn" onclick="navigateToCustomPath()">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

</div>
