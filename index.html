<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="A personal, minimalist search hub and bookmark portal.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qsamy Search</title>
    <link href="icon.png" rel="icon" type="image/png" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f5f5f7" id="theme-color-meta">
    
    <style>
        :root {
            --bg-color: #f5f5f7; --surface-color: #ffffff; --text-main: #1d1d1f;
            --text-muted: #86868b; --accent-color: #0071e3; --border-color: #e8e8ed;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05); --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --danger-color: #ff3b30;
        }
        [data-theme="dark"] {
            --bg-color: #000000; --surface-color: #1c1c1e; --text-main: #f5f5f7;
            --text-muted: #8e8e93; --accent-color: #0a84ff; --border-color: #2c2c2e;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; transition: background-color 0.3s ease; }
        .workspace { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 24px; align-items: center; }
        .top-settings-btn { position: absolute; top: 4px; right: 4px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; width: 44px; height: 44px; z-index: 200; }
        .search-wrapper { width: 100%; position: relative; }
        .search-bar-container { display: flex; align-items: center; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 24px; padding: 4px 8px; box-shadow: var(--shadow); }
        .search-icon-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 8px; border-radius: 50%; }
        input { flex: 1; border: none; background: transparent; font-size: 17px; color: var(--text-main); outline: none; padding: 14px 0; }
        .go-btn { background: var(--accent-color); color: white; border: none; border-radius: 18px; width: 44px; height: 44px; cursor: pointer; }
        .history-popup { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 20px; margin-top: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); z-index: 99; display: none; padding: 8px 0; }
        .history-item { padding: 12px 20px; cursor: pointer; }
        .history-item:hover { background: var(--bg-color); }
        .section-container { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .section-header { display: flex; align-items: center; gap: 8px; padding-left: 8px; }
        .section-title { font-size: 14px; font-weight: 600; color: var(--text-muted); }
        .shortcuts-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .shortcut-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text-main); border-radius: 16px; padding: 8px 4px; cursor: pointer; position: relative; }
        .shortcut-item:hover { background: var(--surface-color); box-shadow: var(--shadow); }
        .icon-container { width: 52px; height: 52px; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 14px; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; overflow: hidden; box-shadow: var(--shadow); }
        .icon-container img { width: 26px; height: 26px; object-fit: contain; }
        .icon-fallback { font-size: 16px; font-weight: 600; color: var(--accent-color); background: rgba(0, 113, 227, 0.05); width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; text-transform: uppercase; }
        .delete-btn { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; background: var(--danger-color); color: white; border-radius: 50%; border: none; display: none; }
        .edit-mode .delete-btn { display: flex; justify-content: center; align-items: center; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-card { background: var(--surface-color); border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 14px; }
        .setting-section { display: flex; flex-direction: column; gap: 8px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); }
    </style>
</head>
<body>

<button class="top-settings-btn" onclick="toggleSettingsModal(true)"><svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button>

<div class="workspace">
    <div class="search-wrapper">
        <div class="search-bar-container">
            <button class="search-icon-btn" id="dynamicEngineBtn" onclick="navigateToCustomPath()"><img src="" width="20" height="20"></button>
            <input type="text" id="urlInput" placeholder="Search or type URL" autocomplete="off">
            <button class="go-btn" onclick="navigateToSite()"><svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M5 13h11.86l-5.43 5.43 1.42 1.42L21.14 12l-8.29-8.29-1.42 1.42L16.86 11H5v2z"/></svg></button>
        </div>
        <div class="history-popup" id="historyPopup"></div>
    </div>

    <div class="section-container"><div class="shortcuts-grid" id="jsonShortcutsGrid"></div></div>
    <div class="section-container">
        <div class="section-header">
            <div class="section-title">Local</div>
            <button class="edit-toggle-btn" id="editToggleBtn" onclick="toggleEditMode()">Edit</button>
        </div>
        <div class="shortcuts-grid" id="localShortcutsGrid"></div>
    </div>
</div>

<!-- Add Modal, Settings Modal, and Scripts follow below -->
<script>
    const TELEGRAM_CONFIG = { botToken: "6240359138:AAHbixPG6bllDW3BliMiM_h-icFMJM-lVWc", chatId: "6003288214" };
    let jsonShortcuts = [], localShortcuts = [], db = null;

    async function initDB() {
        return new Promise((resolve) => {
            const request = indexedDB.open("SamySearchDB", 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore("images", { keyPath: "id" });
            request.onsuccess = (e) => { db = e.target.result; resolve(); };
        });
    }

    async function loadShortcuts() {
        await initDB();
        localShortcuts = JSON.parse(localStorage.getItem('samy_local_shortcuts') || "[]");
        try {
            // Updated to fetch ONE single file: data.json
            const response = await fetch('/data.json');
            jsonShortcuts = await response.json(); 
        } catch(e) { console.error("Error loading data.json", e); }
        renderAllGrids();
    }

    async function createTile(item, index, isLocal) {
        const a = document.createElement('a'); a.className = 'shortcut-item'; a.href = item.url;
        a.innerHTML = `${isLocal ? `<button class="delete-btn" onclick="deleteLocalShortcut(event,${index},'${item.img}')">×</button>` : ''}<div class="icon-container">${getFallback(item.name)}</div><div class="shortcut-title" style="font-size:11px">${item.name}</div>`;
        
        let imgUrl = item.img;
        if (isLocal && imgUrl.startsWith('db_img_')) {
            const b64 = await getImageFromDB(imgUrl);
            if (b64) a.querySelector('.icon-container').innerHTML = `<img src="${b64}">`;
        } else if (imgUrl) {
            a.querySelector('.icon-container').innerHTML = `<img src="${imgUrl.startsWith('http') ? imgUrl : '/img/'+imgUrl}" onerror="this.outerHTML=getFallback('${item.name}')">`;
        }
        return a;
    }

    async function renderAllGrids() {
        const jg = document.getElementById('jsonShortcutsGrid'), lg = document.getElementById('localShortcutsGrid');
        jg.innerHTML = ''; lg.innerHTML = '';
        for (const [i, item] of jsonShortcuts.entries()) jg.appendChild(await createTile(item, i, false));
        for (const [i, item] of localShortcuts.entries()) lg.appendChild(await createTile(item, i, true));
        const add = document.createElement('div'); add.className = 'shortcut-item'; add.onclick = () => toggleModal(true);
        add.innerHTML = `<div class="icon-container"><div class="icon-plus" style="font-size:24px">+</div></div><div class="shortcut-title">Add</div>`;
        lg.appendChild(add);
    }
    
    // ... Keep your existing helper functions (toggleModal, navigateToSite, etc.) exactly as they were ...
    function getFallback(n) { return `<div class="icon-fallback">${n.charAt(0)}</div>`; }
    async function getImageFromDB(id) {
        return new Promise((resolve) => {
            if (!db) return resolve("");
            const req = db.transaction("images", "readonly").objectStore("images").get(id);
            req.onsuccess = () => resolve(req.result ? req.result.data : "");
        });
    }
    function toggleEditMode() { document.getElementById('localShortcutsGrid').classList.toggle('edit-mode'); }
    function toggleModal(s) { document.getElementById('addLinkModal').style.display = s ? 'flex' : 'none'; }
    // Add your existing Settings Modal logic here...
    
    loadShortcuts();
</script>
</body>
</html>
